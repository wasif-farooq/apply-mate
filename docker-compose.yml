version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: applymate-db
    environment:
      POSTGRES_USER: applymate
      POSTGRES_PASSWORD: applymate123
      POSTGRES_DB: applymate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applymate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: